<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوبر ماركتي - نظام إدارة المبيعات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 py-12">
        <!-- Hero Section -->
        <div class="text-center mb-12">
            <div class="inline-block p-4 bg-white/20 backdrop-blur rounded-full mb-6">
                <div class="w-20 h-20 bg-gradient-to-br from-purple-600 to-blue-600 rounded-full flex items-center justify-center shadow-2xl">
                    <i class="fas fa-store text-white text-3xl"></i>
                </div>
            </div>
            <h1 class="text-5xl font-black text-white mb-4">سوبر ماركتي</h1>
            <p class="text-xl text-white/80 max-w-2xl mx-auto">نظام متكامل لإدارة المبيعات والمخزون ونقاط البيع</p>
        </div>

        <!-- Cards Section -->
        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-6xl mx-auto">
            <a href="pos.html" class="card block text-center hover:scale-105 transition">
                <div class="card-body py-8">
                    <div class="w-20 h-20 mx-auto bg-gradient-to-br from-purple-100 to-blue-100 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fas fa-cash-register text-3xl text-purple-600"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">نقطة البيع</h3>
                    <p class="text-gray-500 mt-2 text-sm">شاشة الكاشير السريعة</p>
                </div>
            </a>

            <a href="products.html" class="card block text-center hover:scale-105 transition">
                <div class="card-body py-8">
                    <div class="w-20 h-20 mx-auto bg-gradient-to-br from-green-100 to-emerald-100 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fas fa-boxes text-3xl text-green-600"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">إدارة المنتجات</h3>
                    <p class="text-gray-500 mt-2 text-sm">إضافة وتعديل وحذف المنتجات</p>
                </div>
            </a>

            <a href="dashboard.html" class="card block text-center hover:scale-105 transition">
                <div class="card-body py-8">
                    <div class="w-20 h-20 mx-auto bg-gradient-to-br from-blue-100 to-cyan-100 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fas fa-chart-line text-3xl text-blue-600"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">لوحة التحكم</h3>
                    <p class="text-gray-500 mt-2 text-sm">إحصائيات وتقارير</p>
                </div>
            </a>

            <a href="reports.html" class="card block text-center hover:scale-105 transition">
                <div class="card-body py-8">
                    <div class="w-20 h-20 mx-auto bg-gradient-to-br from-orange-100 to-amber-100 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fas fa-file-alt text-3xl text-orange-600"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">التقارير</h3>
                    <p class="text-gray-500 mt-2 text-sm">تقارير المبيعات والمخزون</p>
                </div>
            </a>
        </div>

        <!-- Footer -->
        <div class="text-center mt-12 text-white/60 text-sm">
            <p>© 2024 سوبر ماركتي - جميع الحقوق محفوظة</p>
        </div>
    </div>
</div>

</body>
</html>
